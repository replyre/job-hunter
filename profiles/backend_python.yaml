    - "Previously built multitenant SaaS + Stripe integrations processing 2,000+ monthly transactions."
  dm_short_template: "{greeting}, I noticed {company} is hiring for {title}. I have {bio_short} — shipped a healthcare SaaS serving 5,000+ users with sub-200ms APIs. Would love to connect."
