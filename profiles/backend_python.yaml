    {greeting},

    Noticed {company} is hiring for {title}. The stack caught my eye — I've been shipping {stack} backends for 3+ years.

    {achievements}

    Open to a 15-min chat to see if there's a fit?

    Thanks,
    {candidate_name}
  email_digest_subject_role: "backend"
  email_greeting: "Your Daily Job Digest"
