outreach:
  candidate_name: "[Your Name]"
  candidate_core_tech: ["python", "java", "javascript", "sql"]
  candidate_extra_tech: ["git", "html", "css", "linux"]
  linkedin_search_titles:
    - { title: "Engineering Manager", label: "Eng Manager", category: "engineering" }
    - { title: "Tech Lead", label: "Tech Lead", category: "engineering" }
    - { title: "Campus Recruiter", label: "Campus Recruiter", category: "hr" }
    - { title: "Technical Recruiter", label: "Tech Recruiter", category: "hr" }
    - { title: "HR Manager", label: "HR Manager", category: "hr" }
    - { title: "University Recruiting", label: "University Recruiting", category: "hr" }
  bio_short: "a fresh graduate with hands-on projects in {stack}"
  achievements:
    - "CS graduate with strong fundamentals in data structures, algorithms, and OOP."
    - "Built 3+ full-stack projects on GitHub — REST APIs, authentication, database design."
    - "Contributed to 2 open-source projects; comfortable shipping PRs and reading large codebases."
  dm_short_template: "{greeting}, I saw {company} is hiring for {title}. I'm {bio_short}. Would love to connect and learn more about the role."
  dm_long_template: |
    {greeting},

    I noticed {company} is hiring for {title}. The stack caught my eye — I've been building with {stack} through my coursework and side projects.

    {achievements}

    Would love a 15-min chat to hear what you look for in new grads.

    Thanks,
    {candidate_name}
  email_digest_subject_role: "entry-level"
  email_greeting: "Your Daily Job Digest"
