name: "Fresher / Entry-Level (Any Stack)"
description: "For new grads and interns — no YOE penalty, rewards junior/trainee signals, broad tech stack."
schema_version: 1

search:
  default_terms:
    - "software engineer fresher"
    - "graduate software engineer"
    - "entry level developer"
    - "junior software engineer"
    - "software engineer trainee"
    - "new grad software engineer"
  title_keywords_positive:
    - "software engineer"
    - "software developer"
    - "engineer"
    - "developer"
    - "graduate"
    - "entry level"
    - "entry-level"
    - "junior"
    - "trainee"
    - "intern"
    - "associate"
    - "fresher"
    - "new grad"
    - "associate engineer"
    - "campus hire"
  title_keywords_negative:
    - "senior"
    - "sr."
    - "staff"
    - "principal"
    - "lead"
    - "architect"
    - "manager"
    - "director"
    - "head of"
    - "vp"
    - "10+ years"
    - "8+ years"
    - "5+ years"
  relevant_tech:
    - "python"
    - "java"
    - "javascript"
    - "typescript"
    - "c++"
    - "c#"
    - "go"
    - "sql"
    - "html"
    - "css"
    - "react"
    - "node"
    - "nodejs"
    - "django"
    - "flask"
    - "spring"
    - "git"
    - "linux"
    - "docker"
    - "aws"
    - "rest"
    - "mysql"
    - "postgresql"
    - "mongodb"
  jsearch_default_queries:
    - { query: "graduate software engineer", country: "IN", date_posted: "week", remote_jobs_only: false }
    - { query: "entry level software developer", country: "IN", date_posted: "week", remote_jobs_only: false }
    - { query: "junior software engineer", country: "IN", date_posted: "week", remote_jobs_only: false }
    - { query: "fresher software developer", country: "IN", date_posted: "3days", remote_jobs_only: false }
    - { query: "software engineer trainee", country: "IN", date_posted: "week", remote_jobs_only: false }
    - { query: "new grad software engineer", country: "IN", date_posted: "week", remote_jobs_only: true }

scoring:
  experience_target: "fresher"
  min_relevance_score: 40
  min_score_to_store: 20
  weights: { title: 35, tech: 30, experience: 20, signal: 15 }
  core_tech:
    - "python"
    - "java"
    - "javascript"
    - "sql"
    - "git"
  backend_signals:
    - "learn"
    - "mentor"
    - "training"
    - "onboarding"
    - "rotation"
    - "fundamental"
    - "fresh graduate"
    - "b.tech"
    - "b.e."
    - "mca"
    - "0-1 year"
    - "0-2 years"
    - "campus"
    - "new grad"
    - "entry level"

